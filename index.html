<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stock Prediction Game</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="app.js" defer></script>
    <meta name="description" content="Predict whether the stock price will go up or down using real Alpha Vantage data.">
</head>
<body>
    <header class="container">
        <h1>Stock Prediction Game</h1>
        <p class="subtitle">Powered by real data from Alpha Vantage</p>
    </header>

    <main class="container">
        <section class="card">
            <form id="setup-form" class="form-row" autocomplete="off">
                <div class="field">
                    <label for="apiKey">Alpha Vantage API Key</label>
                    <input id="apiKey" name="apiKey" type="text" placeholder="Enter API key" value="API KEY FROM STEP 4" required>
                </div>
                <div class="field">
                    <label for="symbol">Stock Ticker</label>
                    <input id="symbol" name="symbol" type="text" placeholder="e.g., MSFT, AAPL, COF" required>
                </div>
                <div class="actions">
                    <button id="startBtn" type="submit">Start Game</button>
                </div>
            </form>
            <div id="status" class="status" role="status" aria-live="polite"></div>
        </section>

        <section class="grid">
            <div class="card">
                <div class="info">
                    <div><strong>Symbol:</strong> <span id="info-symbol">—</span></div>
                    <div><strong>Start date:</strong> <span id="info-start-date">—</span></div>
                    <div><strong>Current date:</strong> <span id="info-current-date">—</span></div>
                    <div><strong>Current price:</strong> <span id="info-current-price">—</span></div>
                    <div><strong>Score:</strong> <span id="score">0</span></div>
                </div>
                <div class="predict">
                    <button id="btn-up" class="predict-btn" disabled>Predict Up ▲</button>
                    <button id="btn-down" class="predict-btn" disabled>Predict Down ▼</button>
                </div>
                <div class="secondary-actions">
                    <button id="restartBtn" class="link" disabled>Restart</button>
                </div>
            </div>

            <div class="card chart-card">
                <canvas id="chart" height="260" aria-label="Stock price chart" role="img"></canvas>
            </div>
        </section>
    </main>

    <footer class="container footer">
        <small>
            Data provided by <a href="https://www.alphavantage.co/" target="_blank" rel="noreferrer">Alpha Vantage</a>.
            Prices shown use Adjusted Close from the Daily Adjusted endpoint.
        </small>
    </footer>
</body>
</html>
